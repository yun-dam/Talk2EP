      model: gpt-4.1
      max_tokens: 8192
      temperature: 0.0
experiment_config:
  benchmark_path: /data1/hypothesis_dataset/financebench/data/financebench_open_source.jsonl
  gpt_results_path: /data1/hypothesis_dataset/financebench/results/gpt-4_oracle_reverse.jsonl
  files_dir: /data1/hypothesis_dataset/financebench/markdown/pdfs/
  soft_evaluator_model: gpt-4.1
  hard_evaluator_model: gpt-4.1
  num_questions: null
  random_state: 42
  document_config:
    chunk_size: 16000
    overlap_size: 0
output_file: finance_bench_sliders_seq_agent_no_decompose_nl.json