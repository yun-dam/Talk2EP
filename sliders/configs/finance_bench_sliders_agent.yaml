  models:
    answer:
      model: gpt-4.1
      max_tokens: 8192
      temperature: 0.0
    answer_no_table:
      model: gpt-4.1-mini
      max_tokens: 8192
      temperature: 0.0
    answer_tool_output:
      model: gpt-4.1
      max_tokens: 8192
      temperature: 0.0
    extract_schema:
      model: gpt-4.1
      max_tokens: 8192
      temperature: 0.0
    derive_atomic_fields:
      model: gpt-4.1
      max_tokens: 8192
      temperature: 0.0
    generate_schema:
      model: gpt-4.1
      max_tokens: 8192
      temperature: 0.0
    merge_tables:
      model: gpt-4.1
      max_tokens: 8192
      temperature: 0.2
    task_guidelines:
      model: gpt-4.1
      max_tokens: 8192
      temperature: 0.0
    check_objective_necessity:
      model: gpt-4.1
      max_tokens: 8192
      temperature: 0.0
    direct_answer:
      model: gpt-4.1
      max_tokens: 8192
      temperature: 0.0
    force_answer:
      model: gpt-4.1
      max_tokens: 8192
      temperature: 0.0
