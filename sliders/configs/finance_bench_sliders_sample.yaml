experiment: finance_bench
system: sliders
system_config:
  generate_schema:
    add_extra_information_class: true
  extract_schema:
    decompose_tables: false
  merge_tables:
    merge_strategy: objectives_based
  models:
    answer:
      model: azure/gpt-4.1
      max_tokens: 8192
      temperature: 0.0
    answer_no_table:
      model: azure/gpt-4.1-mini
      max_tokens: 8192
      temperature: 0.0
    answer_tool_output:
      model: azure/gpt-4.1
      max_tokens: 8192
      temperature: 0.0
    extract_schema:
      model: azure/gpt-4.1-mini
      max_tokens: 8192
      temperature: 0.0
    generate_schema:
      model: azure/gpt-4.1
      max_tokens: 8192
      temperature: 0.0
    merge_tables:
      model: azure/gpt-4.1
      max_tokens: 8192
      temperature: 0.0
    task_guidelines:
      model: azure/gpt-4.1
      max_tokens: 8192
      temperature: 0.0
    check_objective_necessity:
      model: azure/gpt-4.1
      max_tokens: 8192
      temperature: 0.0  
experiment_config:
  benchmark_path: /data1/hypothesis_dataset/financebench/data/financebench_open_source.jsonl
  gpt_results_path: /data1/hypothesis_dataset/financebench/results/gpt-4_oracle_reverse.jsonl
  files_dir: /data1/hypothesis_dataset/financebench/markdown/pdfs/
  soft_evaluator_model: azure/gpt-4.1
  hard_evaluator_model: azure/gpt-4.1
  num_questions: 1
  random_state: 42
output_file: finance_bench_sliders_objectives_based_sample.json